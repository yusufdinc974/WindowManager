# lumie configuration
# Edit this file and press Super+Shift+R to reload.

terminal = "alacritty"
launcher = "fuzzel"

outer_gaps = 15
inner_gaps = 10
border_width = 2

active_border_color = "#7aa2f7"
inactive_border_color = "#1a1b26"
clear_color = "#14101e"

workspace_names = ["1", "2", "3", "4", "5", "6", "7", "8", "9"]

# ── Keybindings ──

[[keybinds]]
modifiers = { logo = true, shift = true }
key = "Escape"
action = "quit"

[[keybinds]]
modifiers = { logo = true, shift = true }
key = "r"
action = "reload_config"

[[keybinds]]
modifiers = { logo = true }
key = "Return"
action = "spawn_terminal"

[[keybinds]]
modifiers = { logo = true }
